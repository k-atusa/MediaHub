<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaHub - Auth</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        /* Mobile optimization */
        @media (max-width: 599px) {
            body {
                font-size: 15px !important;
                padding: 15px !important;
            }

            input,
            button {
                font-size: 15px !important;
                padding: 10px 12px !important;
            }
        }

        @media (min-width: 600px) {
            body {
                font-size: 17px !important;
            }

            input,
            button {
                font-size: 16px !important;
                padding: 12px 18px !important;
            }
        }
    </style>
</head>

<body>
    <main style="max-width: 480px; width: 100%; margin: 60px auto; padding: 10px; box-sizing: border-box;">
        <h2 style="text-align: center; margin-bottom: 20px;">MediaHub 🔒</h2>
        <div style="display: flex; gap: 8px; margin-bottom: 10px;">
            <input type="text" id="username" placeholder="Username" style="margin: 0; flex: 1; min-width: 0;">
            <input type="password" id="password" placeholder="Password" style="margin: 0; flex: 1; min-width: 0;">
        </div>
        <div style="display: flex; gap: 8px;">
            <button id="btnLogin" style="margin: 0; flex: 1;">🔑 Login</button>
            <button id="btnRegister" style="margin: 0; flex: 1; background: #555;">📝 Register</button>
        </div>
    </main>

    <!-- Notice Dialog -->
    <dialog id="noticeModal" style="padding: 20px; max-width: 480px;">
        <h3 style="margin-top: 0;">📢 Notice</h3>
        <p id="noticeText" style="white-space: pre-wrap;"></p>
        <div style="text-align: right;">
            <button id="btnConfirmNotice" style="margin: 0;">Confirm</button>
        </div>
    </dialog>

    <!-- Invite Dialog -->
    <dialog id="inviteModal" style="padding: 20px; max-width: 480px;">
        <h3 style="margin-top: 0;">🔑 Invite Code Required</h3>
        <input type="text" id="inviteCodeInput" placeholder="Enter Invite Code" style="width: 100%; box-sizing: border-box; margin-bottom: 10px;">
        <div style="text-align: right; display: flex; gap: 8px; justify-content: flex-end;">
            <button id="btnCancelInvite" style="margin: 0; background: #555;">Cancel</button>
            <button id="btnConfirmInvite" style="margin: 0;">Confirm</button>
        </div>
    </dialog>

    <script type="module" src="./login.js"></script>
</body>

</html>
