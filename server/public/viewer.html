<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaHub - Viewer</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <style>
        /* Flexible block layout for media rendering */
        .body-box {
            width: 100%;
            min-height: 300px;
            background: #0f0f10;
            border-radius: 6px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #333;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 480px;
            background: inherit;
            color: inherit;
            border: 1px solid #444;
            font-family: inherit;
            padding: 12px;
            font-size: 14px;
            box-sizing: border-box;
        }

        video,
        img {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        iframe {
            width: 100%;
            height: 75vh;
            border: none;
        }

        body {
            max-width: 1200px !important;
            width: 100% !important;
            margin: 0 auto !important;
            box-sizing: border-box;
        }

        .hidden {
            display: none !important;
        }

        /* Mobile (<600px) */
        @media (max-width: 599px) {
            body {
                font-size: 13px !important;
                padding: 10px !important;
            }

            button,
            input,
            select,
            textarea {
                font-size: 13px !important;
                padding: 6px 10px !important;
            }
        }

        /* Desktop (>=600px) */
        @media (min-width: 600px) {
            body {
                font-size: 17px !important;
            }

            button,
            input,
            select,
            textarea {
                font-size: 16px !important;
                padding: 10px 16px !important;
            }
        }
    </style>
</head>

<body>
    <main style="padding: 10px; max-width: 1200px; width: 100%; margin: 0 auto; box-sizing: border-box;">
        <div style="display: flex; gap: 4px; align-items: center; flex-wrap: wrap; margin-bottom: 10px;">
            <button onclick="window.location.href='./folder.html'" style="margin: 0; padding: 6px 10px;"
                title="Back to list">◀</button>
            <input type="text" id="txName" style="margin: 0; flex: 1; min-width: 100px; padding: 6px; font-size: 13px;">
            <button id="btnEdit" style="margin: 0; padding: 6px 10px;" title="Rename">✏️</button>
            <button id="btnDown" style="margin: 0; padding: 6px 10px;" title="Download">📥</button>
            <button id="btnDelete" class="btn-danger" style="margin: 0; padding: 6px 10px;" title="Delete">🗑️</button>
        </div>

        <div id="viewBody" class="body-box">
            <p style="color: #666; font-size: 12px; margin: 20px 0;">Loading...</p>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
            <button id="btnPrevFile" style="margin: 0;" class="hidden">◀ Prev</button>
            <button id="btnNextFile" style="margin: 0;" class="hidden">Next ▶</button>
        </div>
    </main>
    <script type="module" src="./viewer.js"></script>
</body>

</html>
